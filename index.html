<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    
    <title>IPTV NETRANGE - TV AO VIVO</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #000000;
            --main-color: #FF6600; /* Laranja Profissional */
            --font-xs: 1.8vh; --font-sm: 2.2vh; --font-md: 3vh; --font-lg: 5vh;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; outline: none; 
            -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none;           
        }
        
        html, body {
            background: #000000; color: #ffffff; font-family: 'Montserrat', sans-serif;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; 
            overflow: hidden !important; overscroll-behavior: none; touch-action: none;
        }

        .hide { display: none !important; }
        .flex-center { display: flex; align-items: center; justify-content: center; }
        .layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: transparent; overflow: hidden; }

        #orientation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 99999; flex-direction: column; align-items: center; justify-content: center;
            color: var(--main-color); text-align: center; font-weight: 900; font-size: 3vh;
        }
        .phone-icon { font-size: 10vh; margin-bottom: 20px; }
        @media screen and (max-width: 768px) and (orientation: portrait) { #orientation-overlay { display: flex !important; } }

        button, .cat-item, .item, .power-btn, .key, .toggle-btn { cursor: pointer; }
        
        .focused { 
            border: 3px solid #fff !important; background: var(--main-color) !important; color: #000 !important; 
            z-index: 50; box-shadow: 0 0 15px var(--main-color); transform: scale(1.02); transition: all 0.1s ease;
        }
        .focused i, .focused span, .focused div { color: #000 !important; }
        
        #vid-box.focused { border: 4px solid var(--main-color) !important; background: transparent !important; box-shadow: 0 0 20px var(--main-color); }
        #vid-box.fs, #vid-box.fs.focused { border: none !important; width: 100% !important; height: 100% !important; z-index: 9999 !important; position: fixed !important; top: 0 !important; left: 0 !important; background: #000 !important; border-radius: 0 !important; transform: none; box-shadow: none; }

        .login-box { width: 550px; max-width: 95%; padding: 40px; background: #0a0a0a; border: 2px solid var(--main-color); border-radius: 12px; text-align: center; max-height: 95vh; overflow-y: auto; }
        .logo-txt { font-size: 4.5vh; font-weight: 900; margin-bottom: 2.5vh; }
        .theme-text { color: var(--main-color); }
        .inp { width: 100%; padding: 16px; margin: 10px 0; background: #1a1a1a; border: 1px solid #333; color: #fff; text-align: center; font-weight: 600; border-radius: 8px; font-size: 16px; transition: all 0.2s; }
        .btn { width: 100%; padding: 16px; margin-top: 20px; background: var(--main-color); color: #000; border: none; font-weight: 900; border-radius: 8px; font-size: 16px; transition: all 0.2s; }
        .btn-logout { background: #333; color: #fff; margin-top: 10px; border: 1px solid #444; }

        .config-row { display: flex; flex-wrap: wrap; margin: 2vh -0.5vw; }
        .toggle-btn { flex: 1; margin: 0.5vw; padding: 1.5vh; background: #1a1a1a; border: 1px solid #333; color: #888; font-size: 14px; font-weight: 800; border-radius: 1vh; text-align: center; transition: all 0.2s; }
        
        #filter-grid { display: flex; flex-wrap: wrap; margin-bottom: 15px; margin-left: -5px; margin-right: -5px; }
        .filter-item { width: calc(33.33% - 10px); margin: 5px; }

        #content-layer { display: flex; width: 100%; height: 100%; background: #000000; overflow: hidden; }
        .col-cat { width: 25%; background: #08080a; display: flex; flex-direction: column; border-right: 2px solid #1a1a1a; height: 100%; overflow: hidden; }
        .col-list { width: 35%; background: #101014; display: flex; flex-direction: column; border-right: 2px solid #1a1a1a; height: 100%; overflow: hidden; }
        .col-play { flex: 1; display: flex; flex-direction: column; position: relative; background: #000000; height: 100%; overflow: hidden; }

        .cat-head { padding: 15px; background: #15151a; color: var(--main-color); border-bottom: 2px solid #222; text-align: center; font-size: var(--font-md); font-weight: 900; flex-shrink: 0; }
        .cat-top-row { display: flex; align-items: center; justify-content: center; width: 100%; }
        
        .cat-list, .item-list { flex: 1; height: 100%; overflow-y: hidden; position: relative; } /* OVERFLOW HIDDEN PARA O SCROLL CUSTOMIZADO DA TV */
        .cat-item, .item { padding: 14px 20px; border-radius: 6px; margin: 6px 12px; color: #888; font-size: var(--font-sm); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; transition: all 0.1s; }
        .cat-item.active { background: #1a1a1a; color: #fff; border-left: 4px solid var(--main-color); }
        
        .search-area { padding: 15px; background: #050505; border-bottom: 2px solid #1a1a1a; flex-shrink: 0; }
        .inp-search { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; font-size: var(--font-sm); font-weight: bold; border-radius: 6px; text-transform: uppercase; text-align: center; }
        
        .item { border-bottom: 1px solid #1a1a1a; }
        .item.playing { color: var(--main-color); background: #111; border-left: 4px solid var(--main-color); }
        .fav-icon { float: right; color: var(--main-color); }

        .vid-box { 
            width: 100%; height: 50vh; background: #000000; position: relative; border-bottom: 2px solid #222; overflow: hidden; flex-shrink: 0; touch-action: manipulation; transition: border 0.2s; border-radius: 4px;
        }
        
        #player-container { width:100%; height:100%; background:#000000; }
        video { width: 100%; height: 100%; object-fit: fill; background: #000000; z-index: 1; }

        .buffer-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000; z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .buffer-spinner { font-size: 10vh; color: var(--main-color); }

        .meta { padding: 25px; flex: 1; height: 100%; overflow-y: auto; background: #0a0a0c; display: flex; flex-direction: column; }
        .meta-title { font-size: var(--font-lg); color: var(--main-color); font-weight: 900; margin-bottom: 0.5vh; }
        
        .meta-epg { font-size: var(--font-sm); color: #888; flex: 1; overflow-y: auto; line-height: 1.4; margin-bottom: 2vh; }
        
        .info-card { display: flex; justify-content: space-around; align-items: center; background: #111; padding: 2vh 1vw; border-radius: 12px; border: 1px solid #222; margin-bottom: 2vh; margin-top: auto; flex-shrink: 0; }
        .info-col { text-align: center; display: flex; flex-direction: column; }
        .info-col-title { font-size: 1.4vh; color: #888; font-weight: 800; text-transform: uppercase; }
        .info-col-val { font-size: 2.2vh; color: #fff; font-weight: 900; display: flex; align-items: center; justify-content: center; margin-top: 0.8vh; }
        .info-col-val i { color: var(--main-color); margin-right: 8px; }
        
        .keys { display: flex; justify-content: space-between; align-items: center; padding-top: 2vh; border-top: 2px solid #1a1a1a; flex-shrink: 0; }
        .key { flex: 1; font-size: var(--font-xs); color: #fff; font-weight: 700; background: #1a1a1a; border: 1px solid #333; padding: 1.2vh 0.5vw; border-radius: 0.8vh; display: flex; align-items: center; justify-content: center; white-space: nowrap; margin: 0 0.5vw; }
        .key:first-child { margin-left: 0; }
        .key:last-child { margin-right: 0; }
        .dot { width: 1.2vh; height: 1.2vh; border-radius: 50%; flex-shrink: 0; margin-right: 1.2vw; }

        #loader { background: #000000; z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .intro-logo {
            font-size: 14vh;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }
        .intro-logo .theme-text { margin-left: 2vw; }

        #pause-layer { display: none; position: absolute; top:0; left:0; width:100%; height:100%; background: transparent; z-index: 9000; align-items: center; justify-content: center; pointer-events: none; }
        
        /* Ajuste do Scroll para TVs */
        .cat-list-inner, .item-list-inner { position: absolute; width: 100%; transition: transform 0.2s ease-out; }
    </style>
</head>
<body onload="App.init()">

    <div id="orientation-overlay">
        <i class="fas fa-mobile-alt phone-icon"></i>
        <div>POR FAVOR<br><span style="color: var(--main-color);">GIRE A TELA</span></div>
    </div>

    <div id="loader" class="hide flex-center layer">
        <div class="intro-logo">
            <span style="color:#ffffff">IPTV</span><span class="theme-text">NETRANGE</span>
        </div>
    </div>

    <div id="login-layer" class="layer flex-center hide">
        <div class="login-box" id="login-box-container">
            <div class="logo-txt"><span style="color:#ffffff">IPTV</span>&nbsp;<span class="theme-text">NETRANGE</span></div>
            <input type="text" id="i0" class="inp focusable set-focus-l" placeholder="URL DNS" autocomplete="off">
            <input type="text" id="i1" class="inp focusable set-focus-l" placeholder="USUÁRIO" autocomplete="off">
            <input type="password" id="i2" class="inp focusable set-focus-l" placeholder="SENHA" autocomplete="off">
            <button id="btn-login" class="btn focusable set-focus-l" onclick="App.login(false)">ENTRAR AGORA</button>
            <div id="msg-login" style="color:var(--main-color); margin-top:20px; font-size:var(--font-sm); font-weight: 800;"></div>
        </div>
    </div>

    <div id="settings-layer" class="layer hide flex-center">
        <div class="login-box">
            <div class="logo-txt"><i class="fas fa-user-shield" style="margin-right:10px; color: var(--main-color);"></i>MINHA <span class="theme-text">CONTA</span></div>
            
            <div class="config-row">
                <div id="btn-format" class="toggle-btn focusable set-focus" onclick="App.toggleFormat()">FMT: <span id="lbl-format" style="color:#ffffff">TS NAT</span></div>
            </div>

            <div class="config-row" style="margin-top: 10px; margin-bottom: 5px;">
                <div class="toggle-btn" style="border-color: #333; background: #111; cursor: default; width: 100%; margin: 0.5vw;">BLOQUEAR CANAIS / CATEGORIAS</div>
            </div>
            
            <div id="filter-grid"></div>
            
            <button id="btn-close-set" class="btn focusable set-focus" onclick="App.closeSettings()" style="background: #333; color: #ffffff; margin-top: 10px;">VOLTAR</button>
            <button id="btn-logout" class="btn btn-logout focusable set-focus" onclick="App.logout()">SAIR / DESLOGAR</button>
        </div>
    </div>

    <div id="content-layer" class="layer hide">
        <div class="col-cat">
            <div class="cat-head">
                <div class="cat-top-row">
                    <div id="cat-title-txt" style="flex:1;">TV AO VIVO</div>
                </div>
                <div id="item-count" style="font-size: 0.7em; margin-top: 5px; opacity: 0.7;">TOTAL: ...</div>
            </div>
            <div id="cat-list" class="cat-list"><div id="cat-list-inner" class="cat-list-inner"></div></div>

        <div class="col-list">
            <div class="search-area"><input type="text" id="search" class="inp-search focusable" placeholder="BUSCAR..." autocomplete="off"></div>

        <div class="col-play">
            <div id="vid-box" class="vid-box focusable" onclick="App.handleVideoTap(event)">
                <div id="player-container">
                    <video id="player" playsinline webkit-playsinline></video>
                </div>
                
                <div id="smart-buffer" class="buffer-overlay">
                    <i class="fas fa-spinner fa-spin buffer-spinner"></i>
                </div>

                <div id="pause-layer"><i class="fas fa-pause" style="font-size: 10vh; color: #ffffff;"></i></div>
            </div>
            
            <div class="meta">
                <div id="meta-title" class="meta-title"><span style="color:#ffffff">IPTV</span>&nbsp;NETRANGE</div>
                <div id="meta-epg" class="meta-epg">Selecione um canal para assistir</div>
                
                <div id="main-user-info" class="info-card">
                    <div class="info-col">
                        <span class="info-col-title">Usuário</span>
                        <span class="info-col-val" id="ui-user"><i class="fas fa-user"></i> ...</span>

                        <span class="info-col-title">Vencimento</span>
                        <span class="info-col-val" id="ui-exp"><i class="fas fa-calendar-alt"></i> ...</span>
                    </div>
                    <div class="info-col">
                        <span class="info-col-title">Telas</span>
                        <span class="info-col-val" id="ui-conn"><i class="fas fa-desktop"></i> ...</span>
                    </div>

                <div class="keys">
                    <div class="key" id="key-fs"><div class="dot" style="background-color:#FF0000;"></div> TELA CHEIA</div>
                    <div class="key" id="key-top"><div class="dot" style="background-color:#00C851;"></div> TOPO</div>
                    <div class="key" id="key-search"><div class="dot" style="background-color:#ffbb33;"></div> BUSCAR</div>
                    <div class="key" id="key-menu"><div class="dot" style="background-color:#33b5e5;"></div> CONFIG.</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function safePlay(vidElement) {
            if (!vidElement) return;
            try { 
                var p = vidElement.play(); 
                if (p !== undefined && typeof p.catch === 'function') { 
                    p.catch(function(e) {}); 
                } 
            } catch (e) {}
        }

        function requestNativeFullscreen(elem) {
            var target = elem || document.documentElement;
            try {
                if (target.requestFullscreen) { var p = target.requestFullscreen(); if(p !== undefined && typeof p.catch === 'function') { p.catch(function(){}); } } 
                else if (target.webkitRequestFullscreen) { target.webkitRequestFullscreen(); }
            } catch (e) {}
        }
        
        function decodeBase64Safe(str) { 
            try { return decodeURIComponent(escape(window.atob(str))); } 
            catch(e) { return str; } 
        }

        var FavManager = {
            key: 'rc_favs_smart', list: [],
            init: function() { var s = localStorage.getItem(this.key); this.list = s ? JSON.parse(s) : []; },
            toggle: function(id) { var idx = this.list.indexOf(id); if(idx > -1) this.list.splice(idx, 1); else this.list.push(id); localStorage.setItem(this.key, JSON.stringify(this.list)); if (App && App.renderList) App.renderList(); },
            isFav: function(id) { return this.list.indexOf(id) > -1; }
        };

        var PlayerEngine = {
            video: null, url: null, monitorTimer: null, lastTime: 0, stallCount: 0, retryCount: 0, isBuffering: false, maxRetries: 999999,

            init: function() { this.bindVideo(); },

            bindVideo: function() {
                this.video = document.getElementById('player'); 
                if(!this.video) return;
                
                this.video.onerror = function() { PlayerEngine.handleError(false); };
                this.video.onabort = function() { PlayerEngine.handleError(false); };
                this.video.onstalled = function() { PlayerEngine.showBuffer(); };
                this.video.onended = function() { PlayerEngine.handleError(false); };
                this.video.addEventListener('playing', function() { PlayerEngine.onPlaySuccess(); });
                this.video.addEventListener('waiting', function() { PlayerEngine.showBuffer(); });
                this.video.controls = false;
            },

            resetDOM: function() {
                if(this.video) {
                    try { this.video.pause(); } catch(e){}
                    this.video.removeAttribute('src'); 
                    this.video.load(); 
                }
            },

            play: function(url) {
                if (!url) return;
                if(this.url === url && !this.video.error) {
                    if(this.video.paused) safePlay(this.video);
                    return;
                }
                if (this.url && this.url !== url) {
                    this.hardStop();
                    this.resetDOM(); 
                }
                this.url = url; this.stallCount = 0; this.retryCount = 0;
                this.showBuffer();
                document.getElementById('pause-layer').style.display = 'none';
                
                if(this.video) {
                    this.video.src = url; 
                    safePlay(this.video);
                }
                this.startMonitor();
            },
            
            onPlaySuccess: function() { this.stallCount = 0; this.retryCount = 0; this.hideBuffer(); },
            showBuffer: function() { this.isBuffering = true; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'flex'; },
            hideBuffer: function() { this.isBuffering = false; var el = document.getElementById('smart-buffer'); if(el) el.style.display = 'none'; },
            
            startMonitor: function() {
                this.stopMonitor();
                this.monitorTimer = setInterval(function() {
                    var v = PlayerEngine.video; 
                    if(!v || !PlayerEngine.url || v.paused) return;
                    if(Math.abs(v.currentTime - PlayerEngine.lastTime) < 0.1) {
                        PlayerEngine.stallCount++;
                        if(PlayerEngine.stallCount > 3) PlayerEngine.showBuffer();
                        if(PlayerEngine.stallCount > 6) { PlayerEngine.stallCount = 0; PlayerEngine.handleError(true); }
                    } else { 
                        PlayerEngine.stallCount = 0; PlayerEngine.lastTime = v.currentTime; 
                        if(PlayerEngine.isBuffering) PlayerEngine.hideBuffer();
                    }
                }, 2000);
            },
            stopMonitor: function() { if(this.monitorTimer) clearInterval(this.monitorTimer); },
            
            handleError: function(isStall) {
                var limit = this.maxRetries; 
                
                if (this.retryCount < limit) {
                    this.retryCount++;
                    this.showBuffer();
                    this.resetDOM();
                    
                    var delay = Math.min(1000 * Math.pow(1.5, this.retryCount), 5000);
                    setTimeout(function() { 
                        if(PlayerEngine.video && PlayerEngine.url) {
                            PlayerEngine.video.src = PlayerEngine.url;
                            safePlay(PlayerEngine.video);
                        }
                    }, delay);
                } else {
                    this.hardStop();
                }
            },
            
            hardStop: function() { 
                this.stopMonitor(); 
                this.resetDOM();
                this.url = null;
                this.hideBuffer();
            }
        };

        var App = {
            validCategories: null, scr: 0, zone: 0, idx: 0, lastCatIdx: -1, creds: {}, fullData: [], playingId: null,
            cfg: { format: 'ts_native', filters: {} }, userInfo: null, lastEnter: 0,
            categoryDataCache: null, lastScreenSwitch: 0, catScrollY: 0, itemScrollY: 0,
            
            filterDefs: [
                { id: '18', label: '+18 / XXX', keys: ['adulto','xxx','sex','porn','+18'] },
                { id: '4k', label: '4K', keys: ['4k'] },
                { id: 'uhd', label: 'UHD', keys: ['uhd'] },
                { id: 'h265', label: 'H265', keys: ['h265','hevc'] },
                { id: 'fhd', label: 'FHD', keys: ['fhd','full hd'] },
                { id: 'hd', label: 'HD', keys: [' hd','- hd','(hd)', '[hd]'] },
                { id: 'sd', label: 'SD', keys: [' sd','- sd','(sd)', '[sd]'] },
                { id: '24h', label: '24 HORAS', keys: ['24h','24 h','24horas','24 horas'] },
                { id: 'leg', label: 'LEGENDADO', keys: ['leg ','legendado', '[leg]'] }
            ],

            initFilters: function() {
                var grid = document.getElementById('filter-grid');
                var html = [];
                for(var i=0; i<this.filterDefs.length; i++) {
                    var def = this.filterDefs[i];
                    var saved = localStorage.getItem('rc_f_' + def.id);
                    this.cfg.filters[def.id] = (saved === 'true');
                    html.push('<div id="btn-f-'+def.id+'" class="toggle-btn filter-item focusable set-focus" onclick="App.toggleFilter(\''+def.id+'\')">'+def.label+': <span id="lbl-f-'+def.id+'">NÃO</span></div>');
                }
                grid.innerHTML = html.join('');
            },

            toggleFilter: function(id) {
                this.cfg.filters[id] = !this.cfg.filters[id];
                localStorage.setItem('rc_f_' + id, this.cfg.filters[id]);
                this.updateCfgUI();
            },
            
            isAllowed: function(name) {
                if(!name) return true;
                var lower = name.toLowerCase();
                for(var i=0; i<this.filterDefs.length; i++) {
                    var def = this.filterDefs[i];
                    if(this.cfg.filters[def.id]) {
                        for(var j=0; j<def.keys.length; j++) {
                            if(lower.indexOf(def.keys[j]) > -1) return false;
                        }
                    }
                }
                return true;
            },

            init: function() {
                FavManager.init(); 
                this.initFilters();
                
                var savedFmt = localStorage.getItem('rc_cfg_format'); 
                this.cfg.format = (savedFmt === 'm3u8_native' || savedFmt === 'ts_native') ? savedFmt : 'ts_native'; 
                
                PlayerEngine.init(); 
                
                if(localStorage.getItem('rc_h')) {
                    document.getElementById('i0').value = localStorage.getItem('rc_h'); document.getElementById('i1').value = localStorage.getItem('rc_u'); document.getElementById('i2').value = localStorage.getItem('rc_p');
                    document.getElementById('loader').classList.remove('hide'); 
                    App.login(true);
                } else { this.setScr(0); }
            },

            toggleFormat: function() { this.cfg.format = (this.cfg.format === 'ts_native') ? 'm3u8_native' : 'ts_native'; localStorage.setItem('rc_cfg_format', this.cfg.format); this.updateCfgUI(); },
            
            updateCfgUI: function() { 
                var fLbl = this.cfg.format === 'm3u8_native' ? "M3U8 NAT" : "TS NAT"; 
                document.getElementById('lbl-format').innerText = fLbl; 
                document.getElementById('btn-format').style.borderColor = (this.cfg.format !== 'ts_native') ? '#00C851' : '#333'; 
                document.getElementById('lbl-format').style.color = (this.cfg.format !== 'ts_native') ? '#00C851' : '#888'; 
                
                for(var i=0; i<this.filterDefs.length; i++) {
                    var id = this.filterDefs[i].id;
                    var isActive = this.cfg.filters[id];
                    var btn = document.getElementById('btn-f-'+id);
                    var lbl = document.getElementById('lbl-f-'+id);
                    if(btn && lbl) {
                        lbl.innerText = isActive ? "SIM" : "NÃO";
                        lbl.style.color = isActive ? "#FF0000" : "#888";
                        btn.style.borderColor = isActive ? "#FF0000" : "#333";
                    }
                }
            },

            req: function(url, cb) { 
                var x = new XMLHttpRequest(); var cacheBuster = (url.indexOf('?') > -1 ? '&' : '?') + '_t=' + new Date().getTime(); 
                x.open("GET", url + cacheBuster, true); x.timeout = 20000; 
                x.onload = function() { if(x.status===200) { try { var json = JSON.parse(x.responseText); cb(json); } catch(e) { cb(null); } } else { cb(null); } x = null; }; 
                x.onerror = function() { cb('ERR_NET'); x = null; }; x.ontimeout = function() { cb('ERR_NET'); x = null; }; x.send();

            // NOVA FUNÇÃO DE SCROLL OTIMIZADA PARA PHILCO/NETRANGE
            doScrollTV: function(element, containerId, innerId, type) {
                if(!element) return;
                var container = document.getElementById(containerId);
                var inner = document.getElementById(innerId);
                if(!container || !inner) return;

                var elTop = element.offsetTop;
                var elHeight = element.offsetHeight;
                var contHeight = container.offsetHeight;
                
                var newY = (contHeight / 2) - elTop - (elHeight / 2);
                
                // Limites
                if (newY > 0) newY = 0;
                var maxScroll = contHeight - inner.offsetHeight;
                if (maxScroll > 0) maxScroll = 0;
                if (newY < maxScroll) newY = maxScroll;

                if (type === 'cat') this.catScrollY = newY;
                if (type === 'item') this.itemScrollY = newY;

                inner.style.transform = 'translateY(' + newY + 'px)';
            },
            
            updateFocus: function() {
                var focusedItems = document.querySelectorAll('.focused'); for(var k=0; k<focusedItems.length; k++) { focusedItems[k].classList.remove('focused'); }
                var el; 
                if(this.scr===0) { var loginInps = document.querySelectorAll('.set-focus-l'); el = loginInps[this.idx]; }
                if(this.scr===3) { var setBtns = document.querySelectorAll('.set-focus'); el = setBtns[this.idx]; }
                if(this.scr===2) { 
                    if(this.zone===0) el=document.getElementById('c'+this.idx); 
                    if(this.zone===1) el=document.getElementById('search'); 
                    if(this.zone===2) el=document.getElementById('row-'+this.idx); 
                    if(this.zone===3) el=document.getElementById('vid-box'); 
                }
                
                if(el) { 
                    el.classList.add('focused'); 
                    
                    if(el.tagName==='INPUT') { 
                        try { el.focus({preventScroll:true}); } catch(e) { el.focus(); } 
                    } else { 
                        var inps = document.querySelectorAll('input'); for(var i=0; i<inps.length; i++) { inps[i].blur(); } 
                        if (document.activeElement && document.activeElement !== document.body) { try { document.activeElement.blur(); } catch(e) {} } 
                    } 
                    
                    // ROLAGEM ESPECIFICA
                    if(this.scr===2 && this.zone===0) {
                        this.doScrollTV(el, 'cat-list', 'cat-list-inner', 'cat');
                    } else if (this.scr===2 && this.zone===2) {
                        this.doScrollTV(el, 'item-list', 'item-list-inner', 'item');
                    } else if (this.scr===0 || this.scr===3) {
                         // Scroll fallback para menus login/configs
                         try {
                            var parent = el.closest('.login-box');
                            if(parent) {
                                parent.scrollTop = el.offsetTop - (parent.clientHeight / 2) + (el.clientHeight / 2);
                            }
                         } catch(e) {}
                    }
                }
            },
            
            moveSettings: function(d) {
                var curr = this.idx;
                if (d === 0) { 
                    if (curr >= 1 && curr <= 3) this.idx = 0;
                    else if (curr >= 4 && curr <= 9) this.idx -= 3;
                    else if (curr === 10) this.idx = 8;
                    else if (curr === 11) this.idx = 10;
                } else if (d === 1) { 
                    if (curr === 0) this.idx = 2; 
                    else if (curr >= 1 && curr <= 6) this.idx += 3;
                    else if (curr >= 7 && curr <= 9) this.idx = 10; 
                    else if (curr === 10) this.idx = 11;
                } else if (d === 2) { 
                    if ([2,3, 5,6, 8,9].indexOf(curr) > -1) this.idx--;
                } else if (d === 3) { 
                    if ([1,2, 4,5, 7,8].indexOf(curr) > -1) this.idx++;
                }
            },

            move: function(d) {
                var s = this.scr;
                if(s===0) { 
                    var totalLogin = document.querySelectorAll('.set-focus-l').length;
                    if(d===1 && this.idx < totalLogin - 1) this.idx++; 
                    if(d===0 && this.idx > 0) this.idx--; 
                }
                else if(s===3) { 
                    this.moveSettings(d);
                }
                else if(s===2) {
                    if(this.zone===3) { if(d===2) { this.zone=2; this.syncFocusToPlaying(); this.updateFocus(); } return; }
                    
                    if(this.zone===0) { 
                        var max = document.getElementById('cat-list-inner').children.length-1; 
                        if(d===1 && this.idx<max) this.idx++; 
                        if(d===0 && this.idx>0) this.idx--; 
                        if(d===3 && App.fullData.length>0) { this.zone=2; this.idx=0; App.renderList(); } 
                    }
                    else if(this.zone===2) { 
                        var dataLen = App.fullData.length;
                        if(d===1) { if(this.idx < dataLen - 1) this.idx++; }
                        else if(d===0) { if(this.idx > 0) { this.idx--; } else if(this.idx === 0) { this.zone = 1; } } 
                        else if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } 
                        else if(d===3) { this.zone=3; }
                    } 
                    else if(this.zone===1) { 
                        if(d===1 && App.fullData.length>0) { this.zone=2; this.idx=0; } 
                        if(d===2) { this.zone=0; this.idx=(this.lastCatIdx > -1 ? this.lastCatIdx : 0); } 
                    }
                }
                this.updateFocus();
            },

            enter: function() {
                var now = new Date().getTime(); if(now - this.lastEnter < 400) return; this.lastEnter = now;
                var currentScr = this.scr; 
                if(currentScr===0) { 
                    if(document.querySelectorAll('.set-focus-l')[this.idx].id === 'btn-login') this.login(false); else this.move(1); 
                }
                else if(currentScr===3) { 
                    var el = document.querySelectorAll('.set-focus')[this.idx];
                    if(el) { el.click(); }
                }
                else if(currentScr===2) { 
                    if(this.zone===0) this.catClick(this.idx, true); 
                    else if(this.zone===1) this.doSearch(true); 
                    else if(this.zone===2) { this.clickItem(); } 
                    else if(this.zone===3) this.toggleFull(); 
                }
            }
        };

        // EVENTOS DE CONTROLE REMOTO MELHORADOS
        document.addEventListener('keydown', function(e) {
            var k = e.keyCode || e.which;
            
            // Setas
            var isLeft = (k===37 || k===4);
            var isUp = (k===38 || k===19);
            var isRight = (k===39 || k===5);
            var isDown = (k===40 || k===20);
            
            // Enter e OK
            var isEnter = (k===13 || k===295 || k===65305 || k===169); 
            
            // Botões Voltar (Vários mapeamentos Philco, Tizen, LG, WebOS)
            var isBack = (k===8 || k===27 || k===461 || k===10009 || k===88 || k===10007 || k===460 || k===65); 
            
            // Teclas Coloridas / Midia
            var isRed = (k===403 || k===82 || k===112); // R, F1
            var isGreen = (k===404 || k===71 || k===113); // G, F2
            var isYellow = (k===405 || k===89 || k===114); // Y, F3
            var isBlue = (k===406 || k===66 || k===275 || k===115); // B, F4
            
            var isChUp = (k===427 || k===33 || k===176); // Channel Up / Page Up
            var isChDown = (k===428 || k===34 || k===177); // Channel Down / Page Down

            if(document.activeElement && document.activeElement.tagName === 'INPUT' && App.scr === 0) { 
                if(isEnter || isDown) { e.preventDefault(); App.move(1); return; } 
                if(isUp) { e.preventDefault(); App.move(0); return; } 
                return; 
            }
            if(App.scr === 2 && document.activeElement && document.activeElement.tagName === 'INPUT') { 
                if(isEnter) { App.doSearch(true); return; } 
                if(isDown) { e.preventDefault(); App.zone=2; App.idx=0; App.updateFocus(); return; } 
                if(isLeft) { 
                    if(document.activeElement.value === '') { document.activeElement.blur(); App.move(2); } return; 
                } 
                if(isRight) { return; }
                return; 
            }
            
            var isFull = document.getElementById('vid-box').classList.contains('fs');

            // EM TELA CHEIA, ZAPPING DE CANAIS COM SETAS CIMA E BAIXO E CH+/CH-
            if(isFull && App.scr === 2) {
                if(isUp || isChUp) { e.preventDefault(); App.switchChannel(-1); return; }
                if(isDown || isChDown) { e.preventDefault(); App.switchChannel(1); return; }
            } else if (App.scr === 2) {
                if(isChUp) { e.preventDefault(); App.switchChannel(-1); return; }
                if(isChDown) { e.preventDefault(); App.switchChannel(1); return; }
            }

            if(k===48 || k===96) { if(App.scr===2 && App.zone===2) { var it=App.fullData[App.idx]; if(it) { var itId = it.stream_id || it.id; FavManager.toggle(itId); } } }
            
            if(isFull) { 
                e.preventDefault(); 
                if(isRed || isBack || isEnter) { App.exitFull(); return; } 
                return; 
            }
            
            // PREVENT DEFAULT PARA EVITAR ROLAGEM NATIVA DO NAVEGADOR
            if(isLeft || isUp || isRight || isDown || isEnter || isBack) e.preventDefault();

            if(isLeft) { App.move(2); } 
            if(isUp) { App.move(0); } 
            if(isRight) { App.move(3); } 
            if(isDown) { App.move(1); }
            if(isEnter) { App.enter(); } 
            
            if(isBack) { 
                if(App.scr===3) { App.closeSettings(); return; } 
                else if(App.scr>0) { App.back(true); return; } 
            }
            
            if(isRed) if(App.scr===2) App.toggleFull(); 
            if(isGreen) if(App.scr===2) { App.zone=0; App.idx=0; App.updateFocus(); } 
            if(isYellow) if(App.scr===2) { App.zone=1; App.updateFocus(); } 
            if(isBlue) { if(App.scr===2) App.openSettings(); } 
        });

        window.addEventListener('beforeunload', function() { PlayerEngine.hardStop(); });
        window.addEventListener('unload', function() { PlayerEngine.hardStop(); });
        window.addEventListener('pagehide', function() { PlayerEngine.hardStop(); });
    </script>
</body>
</html>
