<style>
/* OTIMIZAÇÃO GPU EXTREMA PARA TVS ANTIGAS E TEMA LARANJA */
:root {
    --bg-deep: #050505; --bg-panel: #111111;
    --main-color: #FF6600; --main-color-glow: rgba(255, 102, 0, 0.4); 
    --danger-color: #FF3B30; --danger-glow: rgba(255, 59, 48, 0.3);
    --font-xs: 1.8vh; --font-sm: 2.2vh; --font-md: 3vh; --font-lg: 5vh;
}
* { margin:0; padding:0; box-sizing:border-box; outline:none; -webkit-tap-highlight-color:transparent; -webkit-user-select:none; user-select:none; }
html, body { background:var(--bg-deep); color:#fff; font-family:'Montserrat', sans-serif; width:100%; height:100%; overscroll-behavior:none; overflow: hidden; }
.theme-text { color:var(--main-color); text-shadow: 0 0 10px rgba(255, 102, 0, 0.2); }
#splash-screen { position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-deep); z-index:9999999; display:flex; flex-direction:column; align-items:center; justify-content:center; transform: translateZ(0); }
.splash-logo { font-size:12vh; font-weight:900; letter-spacing:2px; text-align:center; }
#splash-msg { color:var(--main-color); margin-top:20px; font-size:var(--font-sm); font-weight:700; letter-spacing:1px; white-space:pre-line; text-align:center; line-height:1.5; }
.hide { display:none!important; }
.flex-center { display:flex; align-items:center; justify-content:center; flex-direction:column; }
.layer { position:fixed; top:0; left:0; width:100%; height:100%; z-index:10; background:var(--bg-deep); overflow:hidden; transform: translateZ(0); }
button, .cat-item, .item, .menu-power-btn, .power-btn, .smart-card, .toggle-btn { cursor:pointer; }

.focused { border: 3px solid var(--main-color)!important; box-shadow: 0 0 20px var(--main-color-glow)!important; z-index: 50; will-change: border-color, box-shadow; }
.focused i, .focused .card-title, .focused span { color: var(--main-color)!important; text-shadow: 0 0 10px var(--main-color-glow); }

#vid-box.focused { border: 3px solid var(--main-color)!important; background: transparent!important; box-shadow: inset 0 0 20px var(--main-color-glow), 0 0 20px var(--main-color-glow)!important; }
#vid-box.fs, #vid-box.fs.focused { border:none!important; width:100vw!important; height:100vh!important; z-index:999999!important; position:fixed!important; top:0!important; left:0!important; background:#000!important; display:block!important; box-shadow:none!important; }

.login-box { width:650px; max-width:90%; padding:40px; background:var(--bg-panel); border:1px solid #222; border-radius: 12px; text-align:center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); }
.logo-txt { font-size:4.5vh; font-weight:900; margin-bottom:2.5vh; text-align:center; }
.inp { width:100%; padding:16px; margin:10px 0; background:#000; border:2px solid #333; color:#fff; text-align:center; font-weight:700; font-size:16px; border-radius:6px; }
.inp.focused { background:#0a0a0a!important; }

.btn { width:100%; padding:16px; margin-top:20px; background: linear-gradient(135deg, #FF6600 0%, #CC5200 100%); color:#000; border:3px solid transparent; font-weight:900; font-size:16px; border-radius:8px; text-transform:uppercase; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
.btn.focused { background:#000!important; color:var(--main-color)!important; border:3px solid var(--main-color)!important; box-shadow: 0 0 20px var(--main-color-glow)!important; }

/* Contorno e otimização para os botões de configuração */
.btn-settings { border: 3px solid #FFFFFF !important; transform: translateZ(0); will-change: border-color, box-shadow; }
.btn-settings.focused { border: 3px solid var(--main-color) !important; box-shadow: 0 0 20px var(--main-color-glow) !important; }

.block-panel { border: 2px solid #333; border-radius: 12px; padding: 25px; margin-top: 15px; background: #0a0a0a; text-align: left; box-shadow: inset 0 5px 15px rgba(0,0,0,0.5); }
.block-title { color: var(--danger-color); font-size: 18px; margin-bottom: 20px; font-weight: 900; display:flex; align-items:center; gap:10px; text-shadow: 0 0 10px var(--danger-glow); }
.block-grid { display: block; text-align: center; font-size: 0; }
.toggle-item { display: inline-flex; width: 31%; margin: 1%; padding: 14px 5px; box-sizing: border-box; background: #111; border: 2px solid #333; border-radius: 8px; color: #888; font-size: 14px; font-weight: 800; align-items: center; justify-content: center; vertical-align: top; }
.toggle-item i { margin-right: 8px; }
.toggle-item.active { border-color: var(--danger-color); color: #fff; background: rgba(255, 59, 48, 0.15); box-shadow: 0 0 15px var(--danger-glow); }
.toggle-item.active i { color: var(--danger-color); }
.toggle-item.focused { border-color: var(--main-color)!important; color: var(--main-color)!important; box-shadow: 0 0 15px var(--main-color-glow)!important; background: #000; }
.toggle-item.focused i { color: var(--main-color)!important; }

#content-layer { display:flex; width:100%; height:100%; background:var(--bg-deep); overflow:hidden; }
.col-cat { width:25%; background:var(--bg-panel); display:flex; flex-direction:column; border-right:2px solid #222; height:100%; overflow:hidden; transform: translateZ(0); }
.col-list { width:35%; background:#0a0a0a; display:flex; flex-direction:column; border-right:2px solid #222; height:100%; overflow:hidden; transform: translateZ(0); }
.col-play { flex:1; display:flex; flex-direction:column; position:relative; background:transparent; height:100%; overflow:hidden; transform: translateZ(0); }

.cat-head { padding:20px 15px; background: linear-gradient(180deg, #1a1a1a 0%, #111 100%); color:var(--main-color); border-bottom:2px solid #222; text-align:center; font-size:var(--font-md); font-weight:900; flex-shrink:0; text-shadow: 0 0 8px var(--main-color-glow); }
.cat-top-row { display:flex; align-items:center; width:100%; }
.cat-title-txt { flex:1; text-align:center; letter-spacing: 1px; }
.cat-list, .item-list { flex:1; height:100%; overflow-y:auto; overflow-x:hidden; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

.cat-item, .item { padding:18px 20px; color:#999; font-size:var(--font-sm); font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; border:3px solid transparent; border-bottom: 1px solid #1a1a1a; will-change: border-color, background; }
.cat-item.active { background:#1a1a1a; color:#fff; border-left:5px solid var(--main-color); }
.item.playing { color:var(--main-color); background:#1a1a1a; border-left:5px solid var(--main-color); text-shadow: 0 0 5px var(--main-color-glow); }
.fav-icon { float:right; }

.search-area { padding:15px; background:var(--bg-panel); border-bottom:2px solid #222; flex-shrink:0; }
.inp-search { width:100%; padding:14px; background:#000; border:2px solid #333; color:#fff; font-size:var(--font-sm); font-weight:800; text-transform:uppercase; text-align:center; border-radius: 6px; }
.inp-search.focused { border-color: var(--main-color)!important; box-shadow: 0 0 15px var(--main-color-glow)!important; }

.vid-box { width:100%; height:45vh; background:#000; position:relative; border-bottom:2px solid #222; overflow:hidden; flex-shrink:0; }
#player-container { width:100%; height:100%; background:#000; }
video { width:100%; height:100%; object-fit:fill; background:#000; z-index:1; }
.buffer-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:#050505; z-index:50; display:none; flex-direction:column; align-items:center; justify-content:center; }
.buffer-spinner { font-size:8vh; color:var(--main-color); }
#pause-layer { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:transparent; z-index:9000; align-items:center; justify-content:center; pointer-events:none; }
#pause-layer i { font-size:18vh; color:#FFF!important; text-shadow: 0 10px 20px rgba(0,0,0,0.8); }

/* Alterações cruciais na .meta para impedir barra de rolagem geral e segurar o painel na base */
.meta { padding:20px; flex:1; height:100%; overflow:hidden; background:var(--bg-panel); display:flex; flex-direction:column; }
.meta-title { font-size:4vh; color:#fff; font-weight:900; line-height: 1.1; text-transform: uppercase; flex-shrink: 0; }

/* Apenas a legenda/EPG tem rolagem invisível caso precise de espaço, evitando quebrar o layout */
.meta-subtitle { color:#888; margin-bottom:15px; margin-top: 2.5vh; font-weight:bold; font-size: 2vh; flex: 1; overflow-y: auto; scrollbar-width: none; -ms-overflow-style: none; }
.meta-subtitle::-webkit-scrollbar { display: none; }

/* Infos de Usuário e Vencimento - Fixado na base, sem margin-bottom excedente */
.user-info-panel { display: flex; justify-content: space-between; border: 2px solid #222; border-radius: 12px; padding: 2vh; background: linear-gradient(180deg, #111 0%, #050505 100%); margin-top: auto; margin-bottom: 0; box-shadow: 0 5px 15px rgba(0,0,0,0.5); flex-shrink: 0; }
.u-box { flex: 1; text-align: center; border-right: 1px solid #333; }
.u-box:last-child { border-right: none; }
.u-lbl { font-size: 1.3vh; color: #888; font-weight: 800; text-transform: uppercase; margin-bottom: 0.5vh; }
.u-val { font-size: 2vh; color: #fff; font-weight: 900; }
.u-val i { color: var(--main-color); margin-right: 5px; }

.profiles-container { display:flex; justify-content:center; flex-wrap:wrap; max-width:80vw; }
.profile-card { width:14vw; height:14vw; margin: 1vw; background:linear-gradient(180deg, #181818 0%, #0a0a0a 100%); border:3px solid #222; border-radius:16px; display:flex; flex-direction:column; align-items:center; justify-content:center; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
.profile-card i { font-size:6vh; color:#888; margin-bottom:1.5vh; }
.profile-name { font-size:2.2vh; font-weight:800; color:#ccc; }

::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:#444; border-radius:4px; }
::-webkit-scrollbar-thumb:hover { background:var(--main-color); }
</style>
</head>

    <div id="splash-msg"></div>
</div>

        </div>
    </div>
</div>

        var el = document.getElementById('s'+(i+1));

                el.classList.add('active');
                el.innerHTML = '<i class="far fa-check-square"></i> ' + el.innerText.trim();

isBlocked:function(name){
    var f = this.cfg.filters;
    if(!f.adult && !f.h24 && !f.k4 && !f.uhd && !f.fhd && !f.hd && !f.sd && !f.h265 && !f.leg) return false;
    var n = (name || "").toLowerCase();
    
    if(f.adult && (/adulto|xxx|sex|porn|\+18|teste|expirado/i.test(n))) return true;
    if(f.h24 && (/24h|24 hrs|24 horas/i.test(n))) return true;
    if(f.k4 && (/4k/i.test(n))) return true;
    if(f.uhd && (/uhd|2160p/i.test(n))) return true;
    if(f.h265 && (/h265|hevc|h\.265/i.test(n))) return true;
    if(f.fhd && (/fhd|1080p|1080|full\s*hd/i.test(n))) return true;
    if(f.leg && (/leg|legendado/i.test(n))) return true;
    
    if(f.hd || f.sd){
        var c = n.replace(/fhd|uhd|full\s*hd|1080p|1080/g, '');
        if(f.hd && (/hd|720p|720/i.test(c))) return true;
        if(f.sd && (/(^|[^a-z])sd([^a-z]|$)|480p|480/i.test(c))) return true;
    }
    return false;
},

playStream:function(it){
    var id=it.stream_id;
    var u="";
    if(this.playingId==id){this.toggleFull();return}
    u=this.creds.h+"/live/"+this.creds.u+"/"+this.creds.p+"/"+id+".ts";
    this.playingId=id;
    
    // Tratamento para colocar o formato (FHD, 4K, HD, etc.) em cor Laranja
    var rawName = it.name || it.title;
    var formattedName = rawName.replace(/\b(4K|UHD|FHD|HD|SD|H265|HEVC|1080P|720P)\b/gi, function(match){ 
        return '<span class="theme-text">' + match + '</span>'; 
    });
    document.getElementById('meta-title').innerHTML = formattedName;
    
    var ms=document.getElementById('meta-subtitle');
    // REMOVIDO "Carregando Guia..." para evitar fantasma. Fica limpo até carregar.
    if(ms) { ms.innerHTML = ""; ms.style.display='block'; }

    App.req(this.creds.h+"/player_api.php?username="+this.creds.u+"&password="+this.creds.p+"&action=get_short_epg&stream_id="+id, function(d){
        
        // Impede fantasma: Se você trocou de canal antes de isso carregar, essa linha ignora esse EPG velho
        if(App.playingId !== id) return;

        if(d && d.epg_listings && d.epg_listings.length > 0) {
            var dec = function(str){ 
                if(!str) return "";
                try { return decodeURIComponent(escape(atob(str))); } 
                catch(e){ return str; } 
            };
            
            var agora = dec(d.epg_listings[0].title);
            // Tamanho de fonte aumentado e line-height adicionado
            var txt = "<div style='margin-bottom: 10px; font-size: 2.6vh; line-height: 1.4;'><strong style='color:var(--main-color);'>AGORA:</strong> <span style='color:#fff;'>" + agora + "</span></div>";
            
            if(d.epg_listings.length > 1) {
                // Pega até 3 programas futuros se existirem na lista (índices 1, 2 e 3)
                var limit = Math.min(d.epg_listings.length, 4); 
                for(var e=1; e<limit; e++) {
                    var prox = dec(d.epg_listings[e].title);
                    // Margem top aumentada para 1vh e line-height de 1.4
                    txt += "<div style='margin-top: 1vh; font-size: 2.2vh; line-height: 1.4;'><strong style='color:#888;'>PRÓX:</strong> <span style='color:#ccc;'>" + prox + "</span></div>";
                }
            }
            if(ms) ms.innerHTML = txt;
        } else {
            if(ms) ms.innerHTML = "Sem guia de programação no momento";
        }
    });

    PlayerEngine.play(u);
    requestNativeFullscreen();
    var its=document.querySelectorAll('.item');
    for(var k=0;k<its.length;k++){its[k].classList.remove('playing')}
    var r=document.getElementById('row-'+this.idx);
    if(r)r.classList.add('playing')
},

doSearch:function(isG){
    var rT=document.getElementById('search').value;
    if(rT.length===0){
        if(this.lastCatIdx>-1){
            this.loadContent(this.lastCatIdx)
        }else{

            this.fullData=[];
            this.renderList();
        }

    }
    if(rT.length<2)return;
    var tS=App.removeAccents(rT);

    if(isG){
        var ld='<div style="padding:20px;text-align:center;color:var(--main-color);font-size:2vh"><i class="fas fa-circle-notch fa-spin" style="font-size:5vh;margin-bottom:15px"></i><br><br>BUSCANDO NO SERVIDOR...</div>';
        document.getElementById('item-list').innerHTML=ld;
        
        App.req(App.creds.h+"/player_api.php?username="+App.creds.u+"&password="+App.creds.p+"&action=get_live_streams",function(d){
            if(d&&d!=='ERR_NET'){
                var r=[];
                var mR=200; 
                for(var i=0;i<d.length;i++){
                    var n=d[i].name||d[i].title||"";
                    var cleanN = App.removeAccents(n);
                    var match = true;
                    for(var t=0; t<searchTerms.length; t++){
                        if(cleanN.indexOf(searchTerms[t]) === -1) { match = false; break; }
                    }
                    if(match && !App.isBlocked(n)){
                        r.push(d[i]);
                        if(r.length>=mR)break
                    }
                }
                if(r.length>0){
                    r.sort(App.smartSort);
                    if (r.length > 1500) { r = r.slice(0, 1500); }
                    App.fullData=r;
                    App.zone=2;
                    App.idx=0;
                    App.renderList();
                    App.updateTotalCountUI(r.length,false)
                }else{
                    var ep='<div style="padding:20px;text-align:center">Nenhum resultado.</div>';
                    document.getElementById('item-list').innerHTML=ep;
                    App.updateTotalCountUI(0,false)
                }
            }else{
                document.getElementById('item-list').innerHTML='<div style="padding:20px;text-align:center">Erro de conexão.</div>';
            }
        },30000,false)
    }else{
        setTimeout(function(){
            var bD=App.categoryDataCache||App.fullData;
            if(!bD||bD.length===0)return;
            var r=[];
            for(var i=0;i<bD.length;i++){
                var n=bD[i].name||bD[i].title||"";
                var cleanN = App.removeAccents(n);
                var match = true;
                for(var t=0; t<searchTerms.length; t++){
                    if(cleanN.indexOf(searchTerms[t]) === -1) { match = false; break; }
                }
                if(match){
                    r.push(bD[i])
                }
            }
            if(r.length>0){
                App.fullData=r;
                App.renderList();
                App.updateTotalCountUI(r.length,false)
            }else{
                document.getElementById('item-list').innerHTML='<div style="padding:20px;text-align:center">Não encontrado.<br><br>ENTER PARA GLOBAL</div>';
                App.updateTotalCountUI(0,false)
            }
        },50)
    }
},

move:function(d){var s=this.scr;if(s===0){var max0=document.getElementById('i4').classList.contains('hide')?3:4;if(d===1&&this.idx<max0)this.idx++;if(d===0&&this.idx>0)this.idx--}else if(s===5){var len=this.profiles.length;if(d===3&&this.idx<len)this.idx++;else if(d===2&&this.idx>0)this.idx--}else if(s===6){if(d===1&&this.idx<2)this.idx++;else if(d===0&&this.idx>0)this.idx--}

enter:function(){var n=new Date().getTime();if(n-this.lastEnter<400)return;this.lastEnter=n;var cS=this.scr;if(cS===0){if(this.idx===3)this.loginManual();else if(this.idx===4)this.showProfiles();else if(this.idx<3)this.move(1)}else if(cS===5){if(this.idx===this.profiles.length)this.newProfile();else this.clickProfile(this.idx)}else if(cS===6){if(this.idx===0)this.profileAction('enter');else if(this.idx===1)this.profileAction('delete');else if(this.idx===2)this.profileAction('cancel')}
